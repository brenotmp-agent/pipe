services:
  pipe:
    build:
      context: .
      dockerfile: Dockerfile
    image: pipe:latest
    container_name: pipe

    # ─── Variáveis de ambiente obrigatórias ───────────────────────────────────
    environment:
      # Caminho da chave SSH dentro do container (deve coincidir com o volume abaixo)
      PIPE_SSH_KEY_FILE: /root/.ssh/id_ed25519

      # Token do GitHub — preencha em .env ou exporte antes de subir
      GH_TOKEN: ${GH_TOKEN}

      # API key do kiro-cli (modo headless — autenticação sem interatividade)
      # Gere em: https://app.kiro.dev → API Keys
      KIRO_API_KEY: ${KIRO_API_KEY}

      # Inibe cor nos logs do kiro-cli para facilitar parsing
      KIRO_LOG_NO_COLOR: "1"

      # Fuso horário (opcional — ajuste conforme o ambiente)
      TZ: America/Sao_Paulo

    # ─── Volumes ──────────────────────────────────────────────────────────────
    volumes:
      # Configuração da esteira (obrigatório — ajuste o caminho do host)
      - ./pipe.yml:/app/pipe.yml:ro

      # Contextos dos agentes (obrigatório — criado automaticamente se vazio)
      - ./contexts:/app/contexts

      # Estado interno: snapshots, fila de mudanças, índice de sessões
      # Persistido entre reinícios para não perder rastreamento
      - pipe_state:/app/.pipe

      # Clones dos repositórios (persistido para evitar re-clone)
      - pipe_repos:/app/repo

      # Logs de execução (persistido para auditoria)
      - pipe_logs:/app/logs

      # Chave SSH do host (somente leitura)
      - ${SSH_KEY_FILE:-~/.ssh/id_ed25519}:/root/.ssh/id_ed25519:ro
      - ${SSH_KEY_FILE:-~/.ssh/id_ed25519}.pub:/root/.ssh/id_ed25519.pub:ro

      # Configuração do gh CLI (autenticação — gerada por `gh auth login`)
      - ${GH_CONFIG_DIR:-~/.config/gh}:/root/.config/gh:ro

    # ─── Restart ──────────────────────────────────────────────────────────────
    restart: unless-stopped

    # ─── Recursos (opcional — ajuste conforme o ambiente) ─────────────────────
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512m

# ─── Volumes nomeados ─────────────────────────────────────────────────────────
volumes:
  pipe_state:
    driver: local
  pipe_repos:
    driver: local
  pipe_logs:
    driver: local

# Requer Docker Compose V2 (docker compose, sem hífen)
# Valor central: trocar pipe.yml, contexts/ ou credenciais NÃO exige 'docker build'

services:
  pipe:
    build: .
    env_file:
      - .env
    environment:
      # Caminho INTERNO da chave SSH (determinado pelo compose, não pelo operador)
      - PIPE_SSH_KEY_FILE=/run/secrets/ssh_key
    volumes:
      # Configuração: editar no host + 'docker compose up -d' = nova config SEM rebuild
      - ./pipe.yml:/app/pipe.yml:ro
      - ./contexts:/app/contexts:ro
      # Estado de runtime (persistência validada em US-04 / issue #19)
      - pipe-repo:/app/repo
      - pipe-logs:/app/logs
      - pipe-state:/app/.pipe
      - kiro-home:/home/pipe/.kiro
      - kiro-local:/home/pipe/.local/share/kiro-cli
    secrets:
      - ssh_key
    # Reinicia após crash ou reboot do host; para com docker compose stop (US-05)
    restart: unless-stopped

secrets:
  ssh_key:
    file: ${SSH_KEY_FILE_HOST}   # caminho NO HOST, fornecido via .env

volumes:
  pipe-repo:
  pipe-logs:
  pipe-state:
  kiro-home:
  kiro-local:
